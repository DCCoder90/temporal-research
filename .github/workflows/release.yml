name: Release

on:
  release:
    types: [published]

jobs:
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        working-directory: tools/temporal-lens
        run: wails build -platform darwin/universal -webview2 browser

      - name: Package archive
        working-directory: tools/temporal-lens
        run: |
          mkdir -p dist
          cp -r build/bin/temporal-lens.app dist/
          cp config.json dist/
          cd dist && zip -r ../temporal-lens-macos-universal.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: temporal-lens-macos-universal.zip
          path: tools/temporal-lens/temporal-lens-macos-universal.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        working-directory: tools/temporal-lens
        run: wails build -platform windows/amd64 -webview2 browser

      - name: Package archive
        working-directory: tools/temporal-lens
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item build\bin\temporal-lens.exe dist\
          Copy-Item config.json dist\
          Compress-Archive -Path dist\* -DestinationPath temporal-lens-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: temporal-lens-windows-amd64.zip
          path: tools/temporal-lens/temporal-lens-windows-amd64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux (amd64, CLI only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        working-directory: tools/temporal-lens
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -tags nogui -ldflags="-s -w" -o temporal-lens .

      - name: Package archive
        working-directory: tools/temporal-lens
        run: |
          mkdir -p dist
          cp temporal-lens dist/
          cp config.json dist/
          cd dist && zip -r ../temporal-lens-linux-amd64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: temporal-lens-linux-amd64.zip
          path: tools/temporal-lens/temporal-lens-linux-amd64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
