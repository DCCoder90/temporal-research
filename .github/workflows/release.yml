name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.archive }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            binary: temporal-analyze
            archive: temporal-analyze-macos-arm64.zip
          - goos: darwin
            goarch: amd64
            binary: temporal-analyze
            archive: temporal-analyze-macos-x86_64.zip
          - goos: windows
            goarch: amd64
            binary: temporal-analyze.exe
            archive: temporal-analyze-windows-amd64.zip
          - goos: linux
            goarch: amd64
            binary: temporal-analyze
            archive: temporal-analyze-linux-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build release binary
        working-directory: tools/temporal-analyze
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -tags nogui -ldflags="-s -w" -o ${{ matrix.binary }} .

      - name: Package archive
        working-directory: tools/temporal-analyze
        run: |
          mkdir -p dist
          cp ${{ matrix.binary }} dist/
          cp config.json dist/
          cd dist && zip -r ../${{ matrix.archive }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: tools/temporal-analyze/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
