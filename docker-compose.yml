version: "3.9"

# ── Network ───────────────────────────────────────────────────────────────────
# All containers live on this private bridge network.
# No service ports are published to the host except Wireshark and Temporal UI.
#
# Static IP map:
#   172.20.0.10  postgresql
#   172.20.0.21  temporal-frontend         (external gRPC :7233, membership :6933)
#   172.20.0.22  temporal-history          (gRPC :7234, membership :6934)
#   172.20.0.23  temporal-matching         (gRPC :7235, membership :6935)
#   172.20.0.24  temporal-internal-worker  (gRPC :7239, membership :6939)
#   172.20.0.30  temporal-ui
#   172.20.0.40  hello-world-worker
#   172.20.0.41  hello-world-starter
#   172.20.0.42  scheduled-worker
#   172.20.0.43  signals-worker
#   172.20.0.44  child-workflows-worker
#   172.20.0.45  retries-worker
#   172.20.0.46  saga-worker
#   172.20.0.50  wireshark         (GUI only — reads pcap files from tshark)
#   172.20.0.51  scheduled-starter
#   172.20.0.52  signals-starter
#   172.20.0.53  signals-approve
#   172.20.0.54  signals-reject
#   172.20.0.55  child-workflows-starter
#   172.20.0.56  retries-starter
#   172.20.0.57  saga-starter
#   172.20.0.58  saga-fail-starter
#
# tshark uses network_mode: host so it can capture on the
# "temporal-net" bridge interface and see ALL inter-container traffic.
#
# All example workflow workers and starters use profiles: [manual] and do NOT
# start with `docker compose up`. Invoke them explicitly:
#   docker compose run --rm <starter>     (also starts the worker as a dependency)
#   docker compose up <worker>            (keep a worker running in the background)
#
# Startup sequence:
#   1. temporal-setup              — runs temporal-sql-tool, creates DB schema, exits 0
#   2. temporal-frontend/history/matching/internal-worker
#                                  — start in parallel once setup completes;
#                                    each registers its IP in the RingPop membership
#                                    table (via TEMPORAL_BROADCAST_ADDRESS) so the
#                                    services can discover each other through PostgreSQL
#   3. temporal-default-namespace  — retries until temporal-frontend accepts connections,
#                                    registers the "default" namespace, exits 0
networks:
  temporal-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: temporal-net
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    networks:
      temporal-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - tshark
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: on-failure

  # ── Temporal schema init ─────────────────────────────────────────────────────
  # Uses temporalio/admin-tools (has temporal-sql-tool) to create and migrate
  # the temporal and temporal_visibility databases. Exits 0 when done.
  # The four Temporal service containers depend on this with service_completed_successfully,
  # which avoids the duplicate-key race on cluster_metadata_info that occurs when
  # multiple temporalio/auto-setup containers run schema setup concurrently.
  temporal-setup:
    image: temporalio/admin-tools:latest
    container_name: temporal-setup
    networks:
      - temporal-network
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
    volumes:
      - ./temporal-config/scripts:/scripts
    command: ["/bin/sh", "/scripts/setup.sh"]
    restart: on-failure

  # ── Temporal: frontend ────────────────────────────────────────────────────────
  # External-facing service on :7233. Handles all client gRPC requests (start
  # workflow, signal, query, etc.) and routes them internally to history/matching.
  temporal-frontend:
    image: temporalio/server:latest
    container_name: temporal-frontend
    networks:
      temporal-network:
        ipv4_address: 172.20.0.21
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - SERVICES=frontend
      - TEMPORAL_BROADCAST_ADDRESS=172.20.0.21
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    volumes:
      - ./temporal-config/dynamicconfig:/etc/temporal/config/dynamicconfig
    restart: on-failure

  # ── Temporal: history ─────────────────────────────────────────────────────────
  # Manages per-workflow mutable state and schedules timers/retries on :7234.
  # Receives tasks from frontend via the RingPop membership ring.
  temporal-history:
    image: temporalio/server:latest
    container_name: temporal-history
    networks:
      temporal-network:
        ipv4_address: 172.20.0.22
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - SERVICES=history
      - TEMPORAL_BROADCAST_ADDRESS=172.20.0.22
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    volumes:
      - ./temporal-config/dynamicconfig:/etc/temporal/config/dynamicconfig
    restart: on-failure

  # ── Temporal: matching ────────────────────────────────────────────────────────
  # Manages task queues and dispatches activity/workflow tasks to SDK workers on :7235.
  temporal-matching:
    image: temporalio/server:latest
    container_name: temporal-matching
    networks:
      temporal-network:
        ipv4_address: 172.20.0.23
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - SERVICES=matching
      - TEMPORAL_BROADCAST_ADDRESS=172.20.0.23
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    volumes:
      - ./temporal-config/dynamicconfig:/etc/temporal/config/dynamicconfig
    restart: on-failure

  # ── Temporal: internal worker ─────────────────────────────────────────────────
  # Executes system workflows (archival, namespace replication, etc.) on :7239.
  # PUBLIC_FRONTEND_ADDRESS tells it where to send RPC calls.
  temporal-internal-worker:
    image: temporalio/server:latest
    container_name: temporal-internal-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.24
    depends_on:
      temporal-setup:
        condition: service_completed_successfully
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - SERVICES=worker
      - TEMPORAL_BROADCAST_ADDRESS=172.20.0.24
      - PUBLIC_FRONTEND_ADDRESS=temporal-frontend:7233
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    volumes:
      - ./temporal-config/dynamicconfig:/etc/temporal/config/dynamicconfig
    restart: on-failure

  # ── Default namespace registration ───────────────────────────────────────────
  # Retries until temporal-frontend is accepting connections, then creates the
  # "default" namespace and exits. Uses restart: on-failure to handle the startup
  # window before the frontend is ready.
  temporal-default-namespace:
    image: temporalio/admin-tools:latest
    container_name: temporal-default-namespace
    networks:
      - temporal-network
    depends_on:
      - temporal-frontend
    command: >
      /bin/sh -c "
        until temporal --address temporal-frontend:7233 operator namespace describe default 2>/dev/null ||
              temporal --address temporal-frontend:7233 operator namespace create --retention 1d default 2>/dev/null; do
          echo 'Waiting for temporal-frontend...';
          sleep 3;
        done;
        echo 'Default namespace ready.'
      "
    restart: on-failure

  # ── Temporal web UI ──────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    networks:
      temporal-network:
        ipv4_address: 172.20.0.30
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      - temporal-frontend
    restart: on-failure

  # ── Hello-world worker ───────────────────────────────────────────────────────
  hello-world-worker:
    build:
      context: ./examples/hello-world
      dockerfile: worker/Dockerfile
    container_name: hello-world-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.40
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - temporal-frontend
    restart: on-failure
    profiles: [manual]

  # ── Hello-world starter ──────────────────────────────────────────────────────
  hello-world-starter:
    build:
      context: ./examples/hello-world
      dockerfile: starter/Dockerfile
    container_name: hello-world-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.41
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      hello-world-worker:
        condition: service_started
    restart: "no"
    profiles: [manual]

  # ── Scheduled workflow worker ────────────────────────────────────────────────
  scheduled-worker:
    build:
      context: ./examples/scheduled
      dockerfile: worker/Dockerfile
    container_name: scheduled-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.42
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - temporal-frontend
    restart: on-failure
    profiles: [manual]

  # ── Signals workflow worker ───────────────────────────────────────────────────
  signals-worker:
    build:
      context: ./examples/signals
      dockerfile: worker/Dockerfile
    container_name: signals-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.43
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - temporal-frontend
    restart: on-failure
    profiles: [manual]

  # ── Child workflows worker ────────────────────────────────────────────────────
  child-workflows-worker:
    build:
      context: ./examples/child-workflows
      dockerfile: worker/Dockerfile
    container_name: child-workflows-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.44
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - temporal-frontend
    restart: on-failure
    profiles: [manual]

  # ── Retries workflow worker ───────────────────────────────────────────────────
  retries-worker:
    build:
      context: ./examples/retries
      dockerfile: worker/Dockerfile
    container_name: retries-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.45
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - temporal-frontend
    restart: on-failure
    profiles: [manual]

  # ── Saga workflow worker ──────────────────────────────────────────────────────
  saga-worker:
    build:
      context: ./examples/saga
      dockerfile: worker/Dockerfile
    container_name: saga-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.46
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - temporal-frontend
    restart: on-failure
    profiles: [manual]

  # ── Manual starters (profiles: [manual]) ─────────────────────────────────────
  # These do NOT start with `docker compose up`.
  # Run them explicitly: docker compose run --rm <service-name>

  scheduled-starter:
    build:
      context: ./examples/scheduled
      dockerfile: starter/Dockerfile
    container_name: scheduled-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.51
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - scheduled-worker
    profiles: [manual]

  signals-starter:
    build:
      context: ./examples/signals
      dockerfile: starter/Dockerfile
    container_name: signals-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.52
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - signals-worker
    profiles: [manual]

  signals-approve:
    build:
      context: ./examples/signals
      dockerfile: approve/Dockerfile
    container_name: signals-approve
    networks:
      temporal-network:
        ipv4_address: 172.20.0.53
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
      - WORKFLOW_ID=approval-workflow
    depends_on:
      - signals-worker
    profiles: [manual]

  signals-reject:
    build:
      context: ./examples/signals
      dockerfile: reject/Dockerfile
    container_name: signals-reject
    networks:
      temporal-network:
        ipv4_address: 172.20.0.54
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
      - WORKFLOW_ID=approval-workflow
    depends_on:
      - signals-worker
    profiles: [manual]

  child-workflows-starter:
    build:
      context: ./examples/child-workflows
      dockerfile: starter/Dockerfile
    container_name: child-workflows-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.55
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - child-workflows-worker
    profiles: [manual]

  retries-starter:
    build:
      context: ./examples/retries
      dockerfile: starter/Dockerfile
    container_name: retries-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.56
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - retries-worker
    profiles: [manual]

  saga-starter:
    build:
      context: ./examples/saga
      dockerfile: starter/Dockerfile
    container_name: saga-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.57
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - saga-worker
    profiles: [manual]

  saga-fail-starter:
    build:
      context: ./examples/saga
      dockerfile: fail-starter/Dockerfile
    container_name: saga-fail-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.58
    environment:
      - TEMPORAL_ADDRESS=temporal-frontend:7233
    depends_on:
      - saga-worker
    profiles: [manual]

  # ── tshark (packet capture) ──────────────────────────────────────────────────
  # Runs with host networking so it can see the "temporal-net" bridge and
  # capture ALL inter-container traffic. Writes a ring-buffer of pcap files
  # (5 × 50 MB) to the shared ./captures volume.
  tshark:
    build:
      context: ./tshark
    container_name: tshark
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./captures:/captures
    restart: unless-stopped

  # ── Wireshark (web GUI) ──────────────────────────────────────────────────────
  # Open http://localhost:3000 — use File → Open to load pcap files from
  # /captures (written by the tshark container above).
  # View → Name Resolution → Resolve Network Addresses to show container names.
  wireshark:
    image: lscr.io/linuxserver/wireshark:latest
    container_name: wireshark
    networks:
      temporal-network:
        ipv4_address: 172.20.0.50
    depends_on:
      - tshark
    ports:
      - "3000:3000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./wireshark:/config/.config/wireshark
      - ./captures:/captures:ro
    restart: unless-stopped
