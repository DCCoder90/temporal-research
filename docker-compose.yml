version: "3.9"

# ── Network ───────────────────────────────────────────────────────────────────
# All containers live on this private bridge network.
# No service ports are published to the host except Wireshark and Temporal UI.
#
# Static IP map:
#   172.20.0.10  postgresql
#   172.20.0.20  temporal          (all Temporal services in one process)
#   172.20.0.30  temporal-ui
#   172.20.0.40  hello-world-worker
#   172.20.0.42  scheduled-worker
#   172.20.0.43  signals-worker
#   172.20.0.44  child-workflows-worker
#   172.20.0.45  retries-worker
#   172.20.0.46  saga-worker
#   172.20.0.50  wireshark         (GUI only — reads pcap files from tshark)
#
# tshark uses network_mode: host so it can capture on the
# "temporal-net" bridge interface and see ALL inter-container traffic.
#
# All example workflow workers and starters use profiles: [manual] and do NOT
# start with `docker compose up`. Invoke them explicitly:
#   docker compose run --rm <starter>     (also starts the worker as a dependency)
#   docker compose up <worker>            (keep a worker running in the background)
#
# NOTE on single Temporal container: Temporal v1.29+ performs a non-idempotent
# cluster metadata INSERT on every process startup. Running each service in its
# own container causes a fatal duplicate-key race on the `cluster_metadata_info`
# table. The officially supported Docker Compose topology is one process running
# all services via `temporalio/auto-setup`, which initialises the schema,
# cluster metadata, and default namespace before the server starts.
networks:
  temporal-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: temporal-net
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    networks:
      temporal-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - tshark
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: on-failure

  # ── Temporal server (all services) ──────────────────────────────────────────
  # temporalio/auto-setup handles, in order:
  #   1. DB schema creation and versioned migrations
  #   2. Cluster metadata initialisation (single INSERT, idempotent on retry)
  #   3. Default namespace creation
  #   4. Starting frontend + history + matching + worker in one process
  #
  # Splitting these into four separate containers causes a fatal duplicate-key
  # race on cluster_metadata_info — see network comment above.
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    networks:
      temporal-network:
        ipv4_address: 172.20.0.20
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
      - TEMPORAL_BROADCAST_ADDRESS=172.20.0.20
    volumes:
      - ./temporal-config/dynamicconfig:/etc/temporal/config/dynamicconfig
    restart: on-failure

  # ── Temporal web UI ──────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    networks:
      temporal-network:
        ipv4_address: 172.20.0.30
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      - temporal
    restart: on-failure

  # ── Hello-world worker ───────────────────────────────────────────────────────
  hello-world-worker:
    build:
      context: ./examples/hello-world
      dockerfile: worker/Dockerfile
    container_name: hello-world-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.40
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure
    profiles: [manual]

  # ── Hello-world starter ──────────────────────────────────────────────────────
  hello-world-starter:
    build:
      context: ./examples/hello-world
      dockerfile: starter/Dockerfile
    container_name: hello-world-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.41
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      hello-world-worker:
        condition: service_started
    restart: "no"
    profiles: [manual]

  # ── Scheduled workflow worker ────────────────────────────────────────────────
  scheduled-worker:
    build:
      context: ./examples/scheduled
      dockerfile: worker/Dockerfile
    container_name: scheduled-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.42
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure
    profiles: [manual]

  # ── Signals workflow worker ───────────────────────────────────────────────────
  signals-worker:
    build:
      context: ./examples/signals
      dockerfile: worker/Dockerfile
    container_name: signals-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.43
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure
    profiles: [manual]

  # ── Child workflows worker ────────────────────────────────────────────────────
  child-workflows-worker:
    build:
      context: ./examples/child-workflows
      dockerfile: worker/Dockerfile
    container_name: child-workflows-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.44
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure
    profiles: [manual]

  # ── Retries workflow worker ───────────────────────────────────────────────────
  retries-worker:
    build:
      context: ./examples/retries
      dockerfile: worker/Dockerfile
    container_name: retries-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.45
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure
    profiles: [manual]

  # ── Saga workflow worker ──────────────────────────────────────────────────────
  saga-worker:
    build:
      context: ./examples/saga
      dockerfile: worker/Dockerfile
    container_name: saga-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.46
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure
    profiles: [manual]

  # ── Manual starters (profiles: [manual]) ─────────────────────────────────────
  # These do NOT start with `docker compose up`.
  # Run them explicitly: docker compose run --rm <service-name>

  scheduled-starter:
    build:
      context: ./examples/scheduled
      dockerfile: starter/Dockerfile
    container_name: scheduled-starter
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - scheduled-worker
    profiles: [manual]

  signals-starter:
    build:
      context: ./examples/signals
      dockerfile: starter/Dockerfile
    container_name: signals-starter
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - signals-worker
    profiles: [manual]

  signals-approve:
    build:
      context: ./examples/signals
      dockerfile: approve/Dockerfile
    container_name: signals-approve
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - WORKFLOW_ID=approval-workflow
    depends_on:
      - signals-worker
    profiles: [manual]

  signals-reject:
    build:
      context: ./examples/signals
      dockerfile: reject/Dockerfile
    container_name: signals-reject
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - WORKFLOW_ID=approval-workflow
    depends_on:
      - signals-worker
    profiles: [manual]

  child-workflows-starter:
    build:
      context: ./examples/child-workflows
      dockerfile: starter/Dockerfile
    container_name: child-workflows-starter
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - child-workflows-worker
    profiles: [manual]

  retries-starter:
    build:
      context: ./examples/retries
      dockerfile: starter/Dockerfile
    container_name: retries-starter
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - retries-worker
    profiles: [manual]

  saga-starter:
    build:
      context: ./examples/saga
      dockerfile: starter/Dockerfile
    container_name: saga-starter
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - saga-worker
    profiles: [manual]

  saga-fail-starter:
    build:
      context: ./examples/saga
      dockerfile: fail-starter/Dockerfile
    container_name: saga-fail-starter
    networks:
      - temporal-network
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - saga-worker
    profiles: [manual]

  # ── tshark (packet capture) ──────────────────────────────────────────────────
  # Runs with host networking so it can see the "temporal-net" bridge and
  # capture ALL inter-container traffic. Writes a ring-buffer of pcap files
  # (5 × 50 MB) to the shared ./captures volume.
  tshark:
    build:
      context: ./tshark
    container_name: tshark
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./captures:/captures
    restart: unless-stopped

  # ── Wireshark (web GUI) ──────────────────────────────────────────────────────
  # Open http://localhost:3000 — use File → Open to load pcap files from
  # /captures (written by the tshark container above).
  # View → Name Resolution → Resolve Network Addresses to show container names.
  wireshark:
    image: lscr.io/linuxserver/wireshark:latest
    container_name: wireshark
    networks:
      temporal-network:
        ipv4_address: 172.20.0.50
    depends_on:
      - tshark
    ports:
      - "3000:3000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./wireshark:/config/.config/wireshark
      - ./captures:/captures:ro
    restart: unless-stopped

