version: "3.9"

# ── Network ───────────────────────────────────────────────────────────────────
# All containers live on this private bridge network.
# No service ports are published to the host except the three
# monitoring/UI containers (Wireshark, ntopng, Temporal UI).
#
# Static IP map:
#   172.20.0.10  postgresql
#   172.20.0.20  temporal          (all Temporal services in one process)
#   172.20.0.30  temporal-ui
#   172.20.0.40  hello-world-worker
#   172.20.0.41  hello-world-starter
#   172.20.0.50  wireshark         (GUI only — reads pcap files from tshark)
#
# tshark and ntopng use network_mode: host so they can capture on the
# "temporal-net" bridge interface and see ALL inter-container traffic.
#
# NOTE on single Temporal container: Temporal v1.29+ performs a non-idempotent
# cluster metadata INSERT on every process startup. Running each service in its
# own container causes a fatal duplicate-key race on the `cluster_metadata_info`
# table. The officially supported Docker Compose topology is one process running
# all services via `temporalio/auto-setup`, which initialises the schema,
# cluster metadata, and default namespace before the server starts.
networks:
  temporal-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: temporal-net
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    networks:
      temporal-network:
        ipv4_address: 172.20.0.10
    depends_on:
      - tshark
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: on-failure

  # ── Temporal server (all services) ──────────────────────────────────────────
  # temporalio/auto-setup handles, in order:
  #   1. DB schema creation and versioned migrations
  #   2. Cluster metadata initialisation (single INSERT, idempotent on retry)
  #   3. Default namespace creation
  #   4. Starting frontend + history + matching + worker in one process
  #
  # Splitting these into four separate containers causes a fatal duplicate-key
  # race on cluster_metadata_info — see network comment above.
  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    networks:
      temporal-network:
        ipv4_address: 172.20.0.20
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_SEEDS=postgresql
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
      - TEMPORAL_BROADCAST_ADDRESS=172.20.0.20
    volumes:
      - ./temporal-config/dynamicconfig:/etc/temporal/config/dynamicconfig
    restart: on-failure

  # ── Temporal web UI ──────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    networks:
      temporal-network:
        ipv4_address: 172.20.0.30
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      - temporal
    restart: on-failure

  # ── Hello-world worker ───────────────────────────────────────────────────────
  hello-world-worker:
    build:
      context: ./hello-world
      dockerfile: worker/Dockerfile
    container_name: hello-world-worker
    networks:
      temporal-network:
        ipv4_address: 172.20.0.40
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: on-failure

  # ── Hello-world starter ──────────────────────────────────────────────────────
  hello-world-starter:
    build:
      context: ./hello-world
      dockerfile: starter/Dockerfile
    container_name: hello-world-starter
    networks:
      temporal-network:
        ipv4_address: 172.20.0.41
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      hello-world-worker:
        condition: service_started
    restart: "no"

  # ── tshark (packet capture) ──────────────────────────────────────────────────
  # Runs with host networking so it can see the "temporal-net" bridge and
  # capture ALL inter-container traffic. Writes a ring-buffer of pcap files
  # (5 × 50 MB) to the shared ./captures volume.
  tshark:
    build:
      context: ./tshark
    container_name: tshark
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./captures:/captures
    restart: unless-stopped

  # ── Wireshark (web GUI) ──────────────────────────────────────────────────────
  # Open http://localhost:3000 — use File → Open to load pcap files from
  # /captures (written by the tshark container above).
  # View → Name Resolution → Resolve Network Addresses to show container names.
  wireshark:
    image: lscr.io/linuxserver/wireshark:latest
    container_name: wireshark
    networks:
      temporal-network:
        ipv4_address: 172.20.0.50
    depends_on:
      - tshark
    ports:
      - "3000:3000"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - ./wireshark:/config/.config/wireshark
      - ./captures:/captures:ro
    restart: unless-stopped

  # ── ntopng (traffic analytics) ───────────────────────────────────────────────
  # Open http://localhost:3001 — no login required.
  ntopng:
    image: ntop/ntopng:latest
    platform: linux/amd64
    container_name: ntopng
    network_mode: host
    depends_on:
      - tshark
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command:
      - "-i"
      - "temporal-net"
      - "--community"
      - "--http-port=3001"
      - "--disable-login=1"
      - "-d"
      - "/var/lib/ntopng"
    restart: unless-stopped
